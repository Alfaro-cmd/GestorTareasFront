<div class="card">
  <h3>{{ tarea.titulo }}</h3>
  
  <p class="estado" [ngClass]="tarea.estaCompletada ? 'completada' : 'pendiente'">
    {{ tarea.estaCompletada | estadoTarea }}
  </p>
  
  <p class="dias">
    {{ tarea.fechaLimite | diasRestantes }}
  </p>
  
  <div class="botones">
    <button class="btn-completar" (click)="onCompletar()">Completar</button>
    <button class="btn-eliminar" (click)="onEliminar()">Eliminar</button>
  </div>
</div>
